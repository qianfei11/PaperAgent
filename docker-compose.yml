version: '3.8'

services:
  paper-agent-dev:
    build: .
    container_name: paper-agent-dev
    # Electron应用通常不需要暴露端口，但如果需要Web界面则可以启用
    # ports:
    #   - "3000:3000"
    volumes:
      # 挂载项目源码，便于开发时实时更新
      - .:/usr/src/app
      # 挂载node_modules到容器内，避免覆盖本地的node_modules
      - ./node_modules:/usr/src/app/node_modules
    working_dir: /usr/src/app
    stdin_open: true  # equivalent to docker run -i
    tty: true         # equivalent to docker run -t
    # 为了开发目的，启动编译监视和开发服务器
    command: sh -c "npm run watch & npm run dev"
    environment:
      - NODE_ENV=development
      - ELECTRON_IS_DEV=1
      # 如果需要显示GUI，可能需要额外的环境变量
      # - DISPLAY=$DISPLAY
      # - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus
    # 如果需要访问X11显示服务器（对于GUI应用）
    # network_mode: host