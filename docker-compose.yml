version: '3.8'

services:
  paper-agent-dev:
    build: .
    container_name: paper-agent-dev
    # Electron apps usually do not need a published port, but you can enable one for a web UI.
    # ports:
    #   - "3000:3000"
    volumes:
      # Mount the project source for live development updates.
      - .:/usr/src/app
      # Mount node_modules inside the container so the local copy is not overwritten.
      - ./node_modules:/usr/src/app/node_modules
    working_dir: /usr/src/app
    stdin_open: true  # equivalent to docker run -i
    tty: true         # equivalent to docker run -t
    # For development, start the compiler watcher and the dev app together.
    command: sh -c "npm run watch & npm run dev"
    environment:
      - NODE_ENV=development
      - ELECTRON_IS_DEV=1
      # If you need GUI display forwarding, add the relevant environment variables here.
      # - DISPLAY=$DISPLAY
      # - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus
    # If the container needs X11 access for GUI rendering:
    # network_mode: host
