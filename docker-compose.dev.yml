version: '3.8'

services:
  paper-agent-dev:
    build: .
    container_name: paper-agent-dev
    volumes:
      # Mount the project source for live development updates, while avoiding Windows symlink issues with node_modules.
      - .:/usr/src/app
      - /usr/src/app/node_modules  # Keep node_modules in an anonymous volume.
    working_dir: /usr/src/app
    stdin_open: true  # equivalent to docker run -i
    tty: true         # equivalent to docker run -t
    # Run the default development command, unless overridden.
    command: sh -c "npm install && npm run watch"
    environment:
      - NODE_ENV=development
      - ELECTRON_IS_DEV=1
    # If you need to run the Electron GUI on Linux, the settings below may help.
    # devices:
    #   - /dev/dri:/dev/dri
    # security_opt:
    #   - seccomp:unconfined
    # cap_add:
    #   - SYS_ADMIN

volumes: {}
