name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            build_script: build:linux
            build_args: --x64
            asset_glob: release/*.AppImage
          - name: Windows
            os: windows-2022
            build_script: build:win
            build_args: --x64
            asset_glob: release/*.exe
          - name: macOS
            os: macos-13
            build_script: build:mac
            build_args: --x64
            asset_glob: release/*.dmg

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.name }} binaries
        run: npm run ${{ matrix.build_script }} -- ${{ matrix.build_args }}

      - name: Upload ${{ matrix.name }} release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.asset_glob }}
          fail_on_unmatched_files: true
